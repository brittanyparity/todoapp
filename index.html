<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">To-do</h1>
        <p class="subtitle">Stay on top of what matters.</p>
      </header>

      <form class="composer" id="composer" autocomplete="off">
        <label class="sr-only" for="task-input">New task</label>
        <input
          id="task-input"
          class="task-input"
          type="text"
          name="task"
          placeholder="Add a task…"
          maxlength="500"
          required
        />
        <button type="submit" class="btn btn-primary">Add</button>
      </form>

      <div class="toolbar" id="toolbar" hidden>
        <span class="count" id="count-label" aria-live="polite"></span>
        <button type="button" class="btn btn-ghost" id="clear-done">
          Clear completed
        </button>
      </div>

      <ul class="list" id="list" role="list"></ul>

      <p class="empty" id="empty">No tasks yet. Add one above.</p>
    </div>
    <script src="app.js" defer></script>
  </body>
</html>
